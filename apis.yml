apis:
- aid: columbia-banking:columbia-api-banking
  name: Columbia API Banking
  description: >-
    First-party commercial and treasury-management API product from Columbia
    Bank, providing programmatic access to banking data and operations for
    integration with financial software and ERP platforms. Documented
    capabilities include book transfers, ACH file imports, positive pay,
    stop-payment and NSF management, new account requests, lockbox management,
    transaction and statement retrieval, check images, and real-time account
    balances, with responses available in JSON and XML. A production-ready SDK
    (source code and sample apps) and the gated Columbia API Portal provide
    documentation and an event log for debugging. No public OpenAPI/Swagger
    specification or public base URL was found; technical reference lives behind
    the Columbia API Portal.
  humanURL: https://www.columbiabank.com/commercial/api-banking/
