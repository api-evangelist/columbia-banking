name: Columbia Bank
kind: company
description: >-
  Columbia Bank is an Oregon state-chartered commercial bank and the principal
  banking subsidiary of Columbia Banking System, Inc. (NASDAQ: COLB), a West
  Coast regional bank holding company headquartered in Tacoma, Washington with
  more than $50 billion in assets. The bank took the legal name "Columbia Bank"
  effective July 1, 2025, having previously operated as Umpqua Bank following the
  2023 merger of Columbia Banking System and Umpqua Holdings Corporation. On the
  open-finance front, Columbia is one of the relatively few US regional banks to
  run a first-party developer surface: Columbia API Banking, a commercial and
  treasury-management integration product exposing capabilities such as book
  transfers, ACH file imports, positive pay, stop-payment and NSF management,
  lockbox management, transaction and statement search, check images, and
  real-time account balances in JSON and XML, backed by a production-ready SDK
  and the gated Columbia API Portal. That surface is commercial/ERP-oriented
  rather than a self-serve public developer portal, and consumer-permissioned
  data access is instead delivered through the Plaid aggregator. No documented
  FDX participation or published CFPB Section 1033 posture was found.
